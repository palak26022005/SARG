<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SargRegistration Assistant</title>
  <link rel="stylesheet" href="chat.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <!-- Chat Container -->
  <div class="chat-container">
    <!-- Chat Header -->
    <div class="chat-header">
      <div class="bot-avatar">
        <i class="fas fa-robot"></i>
      </div>
      <div class="bot-info">
        <h3>SargRegistration</h3>
        <span class="status-indicator">
          <span class="status-dot"></span>
          Online
        </span>
      </div>
      <div class="header-actions">
        <button class="minimize-btn" onclick="toggleChat()">
          <i class="fas fa-minus"></i>
        </button>
      </div>
    </div>

    <!-- Chat Messages Area -->
    <div class="chat-messages" id="chatbox">
      <!-- Welcome Message -->
      <div class="welcome-message">
        <div class="bot-avatar-small">
          <i class="fas fa-robot"></i>
        </div>
        <div class="welcome-content">
          <h4>Welcome to SargRegistration! 🌱</h4>
          <p>I'm here to help you complete your registration quickly and easily. Let's get started!</p>
        </div>
      </div>
    </div>

    <!-- Typing Indicator -->
    <div class="typing-indicator" id="typingIndicator" style="display: none;">
      <div class="bot-avatar-small">
        <i class="fas fa-robot"></i>
      </div>
      <div class="typing-dots">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>

    <!-- Input Area -->
    <div class="chat-input-container">
      <div class="input-section" id="inputSection">
        <input type="text" id="userInput" placeholder="Type your answer here..." 
               onkeypress="handleKeyPress(event)" autocomplete="off">
        <button id="sendBtn" onclick="sendMessage()">
          <i class="fas fa-paper-plane"></i>
        </button>
      </div>
    </div>

    <!-- Registration Complete Button -->
    <div class="registration-complete">
      <button id="registerBtn" onclick="submitRegistration()" style="display:none;">
        <i class="fas fa-check-circle"></i>
        Complete Registration
      </button>
    </div>
  </div>

  <script src="chat.js"></script>
</body>
</html>
